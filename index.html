<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sampson Lin | 幸福水泥</title>
  <meta name="description" content="Sampson Lin - Network Engineer, 幸福水泥股份有限公司">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #F2F2F0;
      --surface:   #FFFFFF;
      --border:    rgba(0,0,0,0.08);
      --accent:    #1A5CA8;
      --accent-lo: rgba(26,92,168,0.07);
      --text-hi:   #0E1117;
      --text-md:   #2C3340;
      --text-lo:   #6B7685;
      --text-dim:  #9BA5B0;
      --divider:   rgba(0,0,0,0.06);
    }

    body {
      min-height: 100svh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', 'Noto Sans TC', sans-serif;
      padding: 28px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 390px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 5%, #1A5CA8 40%, #4A8ED4 65%, transparent 95%);
    }

    /* ── Header ── */
    .card-header {
      padding: 38px 32px 26px;
      border-bottom: 1px solid var(--border);
    }

    .co-label {
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .co-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .name-zh {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.28em;
      margin-bottom: 5px;
    }

    .name-en {
      font-size: 30px;
      font-weight: 600;
      color: var(--text-hi);
      letter-spacing: -0.025em;
      line-height: 1;
      margin-bottom: 14px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--accent-lo);
      color: var(--accent);
      letter-spacing: 0.01em;
      font-weight: 500;
    }

    .badge-dept {
      font-size: 12px;
      color: var(--text-lo);
      font-weight: 300;
    }

    /* ── Contacts ── */
    .card-body {
      padding: 18px 32px 4px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 0;
      border-bottom: 1px solid var(--divider);
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .contact-item:last-child { border-bottom: none; }
    .contact-item:active { opacity: 0.65; }

    .icon-wrap {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: var(--accent-lo);
      border: 1px solid rgba(26,92,168,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 15px; height: 15px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-text-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .contact-val {
      font-size: 14px;
      color: var(--text-md);
      font-weight: 400;
    }

    .ext-tag {
      display: inline-block;
      margin-left: 8px;
      font-size: 11px;
      color: var(--text-lo);
      background: #F2F2F0;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 1px 7px;
      border-radius: 5px;
      font-weight: 300;
      vertical-align: middle;
    }

    /* ── Footer ── */
    .card-footer {
      padding: 22px 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 14px;
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: 13px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover { background: #1E6EC4; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px;
      background: transparent;
      color: var(--text-lo);
      border: 1px solid var(--border);
      border-radius: 13px;
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-ghost:hover {
      border-color: rgba(26,92,168,0.3);
      color: var(--accent);
    }

    .qr-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px;
      background: #F8F8F6;
      border: 1px solid var(--border);
      border-radius: 13px;
    }

    .qr-panel.open { display: flex; }

    .qr-hint {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    /* ── Company stamp ── */
    .co-full {
      text-align: center;
      padding: 0 32px 22px;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 10.5px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      line-height: 1.8;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(26,92,168,0.08);
      border: 1px solid rgba(26,92,168,0.2);
      color: var(--accent);
      font-size: 13px;
      padding: 10px 22px;
      border-radius: 30px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <p class="co-label">Luckygrp &nbsp;·&nbsp; 幸福水泥</p>
    <p class="name-zh">林　哲　正</p>
    <h1 class="name-en">Sampson Lin</h1>
    <div class="meta-row">
      <span class="badge">Network Engineer</span>
      <span class="badge-dept">網路工程師 ／ MIS</span>
    </div>
  </div>

  <div class="card-body">
    <a class="contact-item" href="tel:+886225092188,2429">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.09 9.5 19.79 19.79 0 012 5.18 2 2 0 014 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 10.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 17z"/>
        </svg>
      </div>
      <div>
        <p class="contact-text-label">電話 / Phone</p>
        <p class="contact-val">(02) 2509-2188<span class="ext-tag">EXT 2429</span></p>
      </div>
    </a>

    <a class="contact-item" href="mailto:sampson@luckygrp.com.tw">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div>
        <p class="contact-text-label">電子信箱 / Email</p>
        <p class="contact-val">sampson@luckygrp.com.tw</p>
      </div>
    </a>
  </div>

  <div class="card-footer">
    <button class="btn-primary" onclick="downloadVCard()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      儲存至通訊錄
    </button>

    <button class="btn-ghost" id="qr-btn" onclick="toggleQR()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <path d="M14 14h3v3h-3zM17 17h3v3h-3zM14 20v1M20 14v1M17 14v3"/>
      </svg>
      顯示 QR Code
    </button>

    <div class="qr-panel" id="qr-panel">
      <div id="qrcode"></div>
      <p class="qr-hint">掃描開啟此名片頁面</p>
    </div>
  </div>

  <p class="co-full">幸福水泥股份有限公司</p>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  let qrReady = false;

  function toggleQR() {
    const panel = document.getElementById('qr-panel');
    const btn   = document.getElementById('qr-btn');
    const open  = panel.classList.toggle('open');
    btn.textContent = open ? '隱藏 QR Code' : '顯示 QR Code';
    if (open && !qrReady) {
      new QRCode(document.getElementById('qrcode'), {
        text: window.location.href,
        width: 200, height: 200,
        colorDark: '#0E1117',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M
      });
      qrReady = true;
    }
  }

  function downloadVCard() {
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:Sampson Lin',
      'N:Lin;Sampson;;;',
      'NICKNAME:Sampson',
      'ORG:幸福水泥股份有限公司;資管中心 MIS',
      'TITLE:Network Engineer',
      'TEL;TYPE=WORK,VOICE:(02) 2509-2188 ext. 2429',
      'EMAIL;TYPE=WORK:sampson@luckygrp.com.tw',
      'ADR;TYPE=WORK:;;台北市中山區;;; ;台灣',
      'END:VCARD'
    ].join('\r\n');

    const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Sampson_Lin.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✓ 已下載 Sampson_Lin.vcf');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
