<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>名片 - 極簡留白</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* 基礎重置與排版 */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #EBEBEB;
  font-family: 'Outfit', 'Noto Sans TC', sans-serif;
  padding: 32px 16px;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ═══════════════════════════════
   STYLE A — 極簡留白
═══════════════════════════════ */
.card-a {
  background: #FAFAF8;
  border: 1px solid #E0DED8;
  border-radius: 4px;
  padding: 44px 36px 36px;
  position: relative;
  overflow: hidden;
  width: 100%;
  max-width: 420px;
}
.card-a::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #1A1A1A;
}
.card-a .co { 
  font-size: 9px; 
  letter-spacing: .22em; 
  text-transform: uppercase; 
  color: #BBBBBB; 
  margin-bottom: 28px; 
  font-family: 'Outfit', sans-serif; 
}
.card-a .zh { 
  font-family: 'Noto Sans TC', sans-serif; 
  font-size: 11px; 
  color: #CCCCCC; 
  letter-spacing: .3em; 
  font-weight: 300; 
  margin-bottom: 6px; 
}
.card-a .en { 
  font-family: 'Cormorant Garamond', serif; 
  font-size: 38px; 
  font-weight: 300; 
  color: #1A1A1A; 
  letter-spacing: -.01em; 
  line-height: 1; 
  margin-bottom: 18px; 
  font-style: italic; 
}
.card-a .rule { 
  height: 1px; 
  background: #E5E5E5; 
  margin-bottom: 18px; 
}
.card-a .title { 
  font-size: 11px; 
  color: #888; 
  letter-spacing: .08em; 
  margin-bottom: 20px; 
}
.card-a .contacts { 
  display: flex; 
  flex-direction: column; 
  gap: 7px; 
}
.card-a .ci { 
  font-size: 12px; 
  color: #555; 
  letter-spacing: .01em; 
}
.card-a .ci span { 
  color: #BBBBBB; 
  margin-right: 10px; 
  font-size: 10px; 
  letter-spacing: .1em; 
  text-transform: uppercase; 
}
</style>
</head>
<body>

  <div class="card-a">
    <p class="co">Luckygrp · 幸福水泥</p>
    <p class="zh">林 哲 正</p>
    <h2 class="en">Sampson Lin</h2>
    <div class="rule"></div>
    <p class="title">Network Engineer &nbsp;／&nbsp; 資管中心 MIS</p>
    <div class="contacts">
      <p class="ci"><span>Tel</span>(02) 2509-2188 ext. 2429</p>
      <p class="ci"><span>Mail</span>sampson@luckygrp.com.tw</p>
    </div>
  </div>

</body>
</html>
